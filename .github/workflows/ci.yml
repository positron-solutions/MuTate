name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# ah, the great ping pong begins.
# CI is great
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Test
        run: nix develop .#x11
